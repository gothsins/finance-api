name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: ./mvnw clean verify
        env:
          DB_URL: jdbc:h2:mem:testdb
          DB_USER: sa
          DB_PASSWORD:
          JWT_SECRET: testsecretkey1234567890testsecretkey1234567890
          JWT_EXPIRATION: 86400000